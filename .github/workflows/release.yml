name: release

# Auto-release on every source change to main.
#
# Push source to main  →  this workflow bumps the PATCH version in package.json,
# builds the binaries + .deb packages with that version, creates the GitHub
# release + tag, refreshes the APT repo, and commits the bump back to main
# (with [skip ci] so it doesn't re-trigger itself).
#
# No manual versioning needed. For a minor/major bump, trigger it by hand from the
# Actions tab (workflow_dispatch → choose patch / minor / major). Docs/README/GIF-only
# changes are ignored — they never cut a release.
#
# Requires that github-actions[bot] can push to main (no branch protection that
# blocks it, or a PAT) — otherwise the version bump won't persist.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "Formula/**"
      - "packaging/**"
      - "install.sh"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

# Serialize releases so two pushes can't race on the version bump / tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Never re-run on our own bump/APT commits (they carry [skip ci]); always run
    # when triggered by hand.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    env:
      HAS_GPG: ${{ secrets.GPG_PRIVATE_KEY != '' }}
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
      BUMP: ${{ github.event.inputs.bump || 'patch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bump the version BEFORE building so the binary embeds it (Banner +
      # `vpn --version` read package.json at build time).
      - name: Bump version
        id: ver
        run: |
          TAG="$(npm --no-git-tag-version version "$BUMP")"   # e.g. v1.1.0, updates package.json
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Cross-compile all targets
        run: bun run build

      - name: Compute checksums
        id: sums
        run: |
          cd dist
          for f in vpn-*; do
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "$f: $sha"
            echo "${f//-/_}=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Build .deb packages
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sudo apt-get update && sudo apt-get install -y dpkg-dev reprepro
          bash scripts/build-deb.sh "$VERSION" amd64
          bash scripts/build-deb.sh "$VERSION" arm64

      # --- APT repository on GitHub Pages -----------------------------------
      # Requires repo secrets: GPG_PRIVATE_KEY (ascii-armored), GPG_KEY (key id/email).
      - name: Import GPG key
        if: env.HAS_GPG == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY: ${{ secrets.GPG_KEY }}
        run: |
          export GNUPGHOME="$HOME/.gnupg"
          mkdir -p "$GNUPGHOME" && chmod 700 "$GNUPGHOME"
          # Sign non-interactively (no TTY in CI): loopback pinentry, no tty prompts.
          printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
          printf 'pinentry-mode loopback\nno-tty\n' > "$GNUPGHOME/gpg.conf"
          gpgconf --kill gpg-agent || true

          # Import via a file (robust against shell quoting of the multi-line key).
          printf '%s\n' "$GPG_PRIVATE_KEY" > key.asc
          if ! head -1 key.asc | grep -q 'BEGIN PGP PRIVATE KEY BLOCK'; then
            echo "::error::GPG_PRIVATE_KEY is not an armored PRIVATE key block."
            echo "It must start with '-----BEGIN PGP PRIVATE KEY BLOCK-----'."
            echo "Re-export with: gpg --armor --export-secret-keys <key> | pbcopy"
            exit 1
          fi
          gpg --batch --import key.asc
          rm -f key.asc

          echo "Imported secret keys:"
          gpg --batch --list-secret-keys --keyid-format=long
          if ! gpg --batch --list-secret-keys "$GPG_KEY" >/dev/null 2>&1; then
            echo "::error::GPG_KEY ('set me to the key's email or fingerprint') does not match any imported key."
            exit 1
          fi
          echo "test" | gpg --batch --yes --local-user "$GPG_KEY" --clearsign > /dev/null \
            && echo "✔ signing works" || { echo "::error::signing failed — is the key passphrase-protected?"; exit 1; }

      - name: Update APT repo
        if: env.HAS_GPG == 'true'
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}
        run: bash scripts/publish-apt.sh dist/*.deb

      # --- Commit the bump (+ APT repo) and tag, then publish ----------------
      # The tag points at the bump commit; the release is attached to it next.
      # [skip ci] keeps this push from re-triggering the workflow.
      - name: Commit bump + tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json docs
          git commit -m "release: ${{ steps.ver.outputs.tag }} [skip ci]"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/vpn-darwin-arm64
            dist/vpn-darwin-x64
            dist/vpn-linux-x64
            dist/vpn-linux-arm64
            dist/*.deb

      # --- Homebrew tap ------------------------------------------------------
      # Fill in the version + sha256 placeholders, then push the formula to the
      # tap repo so `brew upgrade` sees the new version. Pushing to ANOTHER repo
      # needs a PAT with write access to vpncli/homebrew-tap, stored as the
      # HOMEBREW_TAP_TOKEN secret (the default GITHUB_TOKEN can't reach it).
      - name: Patch formula checksums
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "s/^  version .*/  version \"$VERSION\"/" Formula/vpn.rb
          sed -i "s/REPLACE_DARWIN_ARM64/${{ steps.sums.outputs.vpn_darwin_arm64 }}/" Formula/vpn.rb
          sed -i "s/REPLACE_DARWIN_X64/${{ steps.sums.outputs.vpn_darwin_x64 }}/" Formula/vpn.rb
          sed -i "s/REPLACE_LINUX_ARM64/${{ steps.sums.outputs.vpn_linux_arm64 }}/" Formula/vpn.rb
          sed -i "s/REPLACE_LINUX_X64/${{ steps.sums.outputs.vpn_linux_x64 }}/" Formula/vpn.rb

      - name: Publish formula to tap
        if: env.HAS_TAP_TOKEN == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vpncli/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp Formula/vpn.rb tap/Formula/vpn.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vpn.rb
          git commit -m "vpn ${{ steps.ver.outputs.tag }}" || { echo "formula unchanged"; exit 0; }
          git push

      # Fallback when no tap token is set: grab the patched formula from the run's
      # artifacts and commit it to vpncli/homebrew-tap by hand.
      - name: Upload patched formula
        if: env.HAS_TAP_TOKEN != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: formula
          path: Formula/vpn.rb
